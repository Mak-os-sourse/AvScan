services:
  db:
    image: postgres:alpine

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
  redis:
    image: redis:alpine

    ports:
      - "6379:6379"
    volumes:
      - ./redisdata:/data

  app:
    build:
      dockerfile: Dockerfile

    command: uv run main.py

    ports:
      - "2347:8080"
    depends_on:
      - db
      - redis
      - taskiq

  taskiq:
    build:
      dockerfile: Dockerfile

    command: uv run taskiq worker src.app.core.broker_task:broker src.app.tasks --workers 1

    ports:
      - "80:8080"
    
    depends_on:
      - db
      - redis