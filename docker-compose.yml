services:
  db:
    image: postgres:alpine

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
  redis:
    image: redis:alpine

    ports:
      - "6379:6379"
    volumes:
      - ./redisdata:/data